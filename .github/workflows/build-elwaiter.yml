name: Build EL Waiter (Tauri Mobile)

on:
  push:
    tags:
      - 'waiter-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.1)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

# ─── iOS / iPadOS ────────────────────────────────────────────────────────────
jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.ref_name }}"
            VER="${VER#waiter-v}"
          fi
          echo "VERSION=$VER" >> $GITHUB_OUTPUT

      # Load from Vercel + inject Apple team — no static export needed
      - name: Configure Tauri for iOS remote build
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.build.frontendDist = 'https://el-waiter.vercel.app';
            cfg.build.beforeBuildCommand = '';
            cfg.bundle.iOS.developmentTeam = process.env.APPLE_TEAM_ID;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
            console.log('iOS config patched — team:', process.env.APPLE_TEAM_ID);
          "

      - name: Initialize Tauri iOS project
        run: npx tauri ios init

      # ── Pre-compile Rust + bypass Tauri IPC ───────────────────────────────
      # The "Build Rust Code" xcode-script phase requires a running IPC server
      # (spawned by `tauri ios dev/build`). We bypass it by:
      #   1. Pre-compiling the Rust lib directly with cargo
      #   2. Replacing the xcode-script phase in project.pbxproj with `exit 0`
      # Xcode then links the pre-built .a via xcconfig LIBRARY_SEARCH_PATHS.
      # --cfg mobile is required for tauri::mobile_entry_point macro to expand.
      # The xcode-script normally sets this; since we bypassed it, set explicitly.
      # IPHONEOS_DEPLOYMENT_TARGET=17.0 prevents Swift compiler from emitting
      # FORCE_LOAD symbols for swiftCompatibility51/56/Concurrency — those compat
      # libs were removed from Xcode 16's toolchain (iOS 16+ minimum).
      - name: Pre-compile Rust for iOS
        env:
          IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        run: RUSTFLAGS="--cfg mobile" cargo build --target aarch64-apple-ios --release --lib
        working-directory: src-tauri

      # Tauri iOS xcconfig uses -lapp (hardcoded). Our lib is libel_waiter_lib.a.
      # Create a symlink so the linker finds it.
      - name: Symlink libapp.a for Tauri iOS xcconfig
        run: |
          cd src-tauri/target/aarch64-apple-ios/release
          ln -sf libel_waiter_lib.a libapp.a

      - name: Patch Xcode project — replace tauri xcode-script with no-op
        run: |
          python3 << 'EOF'
          pbxproj = 'src-tauri/gen/apple/el-waiter.xcodeproj/project.pbxproj'
          with open(pbxproj, 'r') as f:
              content = f.read()
          marker = 'shellScript = "npm run -- tauri ios xcode-script'
          idx = content.find(marker)
          if idx >= 0:
              end_idx = content.find('";\n', idx)
              if end_idx >= 0:
                  old = content[idx : end_idx + 3]
                  content = content[:idx] + 'shellScript = "exit 0";' + '\n' + content[end_idx + 3:]
                  print('Patched: Build Rust Code phase → exit 0')
              else:
                  print('ERROR: Could not find end of shellScript')
                  exit(1)
          else:
              print('ERROR: Could not find tauri ios xcode-script in pbxproj')
              exit(1)
          with open(pbxproj, 'w') as f:
              f.write(content)
          EOF

      # ── Code signing ──────────────────────────────────────────────────────
      - name: Import distribution certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            -o ~/Library/MobileDevice/Provisioning\ Profiles/elwaiter.mobileprovision

      # ── Build ─────────────────────────────────────────────────────────────
      # Rust is pre-compiled above. LIBRARY_SEARCH_PATHS added explicitly in
      # case xcconfig doesn't have it (belt-and-suspenders for CI).
      - name: Build iOS archive
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd src-tauri/gen/apple
          xcodebuild archive \
            -project el-waiter.xcodeproj \
            -scheme el-waiter_iOS \
            -configuration release \
            -archivePath $RUNNER_TEMP/ELWaiter.xcarchive \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="EL Waiter Distribution" \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            "LIBRARY_SEARCH_PATHS=$(inherited) $GITHUB_WORKSPACE/src-tauri/target/aarch64-apple-ios/release"

      - name: Export IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.elvalue.elwaiter</key>
              <string>EL Waiter Distribution</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/ELWaiter.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      # ── Upload to TestFlight ──────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_ID.p8
          IPA=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EL-Waiter-iOS-v${{ steps.version.outputs.VERSION }}.ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: warn

# ─── Android ─────────────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" --sdk_root=$ANDROID_HOME

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.ref_name }}"
            VER="${VER#waiter-v}"
          fi
          echo "VERSION=$VER" >> $GITHUB_OUTPUT

      # Load from Vercel — same approach as iOS, avoids static export failure
      - name: Configure Tauri for Android remote build
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.build.frontendDist = 'https://el-waiter.vercel.app';
            cfg.build.beforeBuildCommand = '';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
            console.log('Android config patched — frontendDist set to Vercel URL');
          "

      - name: Initialize Tauri Android project
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android init

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npx tauri android build --debug

      - name: Rename APK
        id: apk
        run: |
          APK=$(find src-tauri/gen/android -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            DEST="EL-Waiter-v${{ steps.version.outputs.VERSION }}.apk"
            cp "$APK" "$DEST"
            echo "APK=$DEST" >> $GITHUB_OUTPUT
          fi

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: EL-Waiter-Android-v${{ steps.version.outputs.VERSION }}
          path: "*.apk"
          if-no-files-found: warn
